<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全功能婚禮指揮部</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f8fafc; margin: 0; padding: 0; color: #1e293b; }
        .page { display: none; padding-bottom: 100px; }
        .active { display: block; }
        
        /* 1. 頂部區 (動態行程) */
        .header-box { background: #4f46e5; color: white; padding: 15px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2); }
        .header-item { display: flex; align-items: center; background: rgba(255,255,255,0.1); margin-bottom: 5px; padding: 8px 12px; border-radius: 8px; font-size: 14px; }
        .header-item:last-child { margin-bottom: 0; }
        .header-item.done { opacity: 0.5; text-decoration: line-through; background: rgba(0,0,0,0.1); }

        /* 2. 按鈕區 */
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
        .call-btn { background: white; border-radius: 15px; padding: 15px 5px; text-align: center; text-decoration: none; color: #1e293b; border: 1px solid #e2e8f0; }
        .call-btn div { font-size: 22px; margin-bottom: 4px; }
        .call-btn b { display: block; font-size: 12px; color: #4f46e5; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* 3. 清單區 */
        .section-title { padding: 15px; font-weight: bold; color: #64748b; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .list-container { background: white; margin: 0 15px; border-radius: 16px; overflow: hidden; border: 1px solid #e2e8f0; }
        .list-item { display: flex; align-items: center; padding: 16px; border-bottom: 1px solid #f1f5f9; }
        .list-item:last-child { border-bottom: none; }
        .list-item.done { background: #f8fafc; opacity: 0.5; }
        .list-item.done span { text-decoration: line-through; }
        .list-item input { width: 20px; height: 20px; margin-right: 12px; }

        /* 4. 底部區 */
        .tip-box { background: #fffbeb; border-left: 4px solid #fbbf24; margin: 20px 15px; padding: 15px; border-radius: 0 12px 12px 0; font-size: 13px; color: #92400e; }

        /* 管理頁面樣式 */
        .admin-section { background: white; margin: 15px; padding: 15px; border-radius: 16px; border: 1px solid #e2e8f0; }
        .admin-section h3 { margin: 0 0 15px 0; font-size: 15px; color: #1e293b; display: flex; justify-content: space-between; }
        .edit-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
        input { flex: 1; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; }
        .btn-add { background: #4f46e5; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; width: 100%; margin-top: 5px; }
        .btn-del { background: #fee2e2; color: #ef4444; border: none; padding: 10px; border-radius: 8px; font-size: 12px; }

        /* 導覽列 */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #e2e8f0; display: flex; height: 70px; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #94a3b8; border: none; background: none; }
        .nav-item.active { color: #4f46e5; font-weight: bold; }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="execPage" class="page active">
        <div class="header-box" id="header-display"></div>

        <div class="btn-grid" id="contact-display"></div>

        <div class="section-title">物資與備忘清單</div>
        <div id="list-view" class="list-container"></div>

        <div class="tip-box">
            <b>💡 專家叮嚀：</b><br>
            記得每小時喝一口水，保持微笑！
        </div>
    </div>

    <div id="adminPage" class="page">
        <div style="padding: 20px; font-weight: bold; font-size: 20px;">⚙️ 系統內容管理</div>

        <div class="admin-section">
            <h3>[頂部] 核心行程管理</h3>
            <div id="edit-header-list"></div>
            <div class="edit-row" style="margin-top:15px; border-top:1px solid #eee; pt-10">
                <input type="text" id="new-h-name" placeholder="名稱">
                <input type="time" id="new-h-time" style="flex:0.6">
            </div>
            <button class="btn-add" onclick="addItem('headers')">+ 新增行程</button>
        </div>

        <div class="admin-section">
            <h3>[按鈕區] 快速撥號管理</h3>
            <div id="edit-contact-list"></div>
            <div class="edit-row">
                <input type="text" id="new-c-name" placeholder="對象(如:伴郎)">
                <input type="tel" id="new-c-tel" placeholder="電話">
            </div>
            <button class="btn-add" onclick="addItem('contacts')">+ 新增聯絡人</button>
        </div>

        <div class="admin-section">
            <h3>[清單區] 任務清單管理</h3>
            <div id="edit-task-list"></div>
            <div class="edit-row">
                <input type="text" id="new-t-name" placeholder="任務名稱">
            </div>
            <button class="btn-add" onclick="addItem('tasks')">+ 新增清單項目</button>
        </div>
        
        <div style="padding: 0 15px 20px;">
            <button class="btn-add" style="background:#10b981; padding: 15px;" onclick="saveAndGo()">✅ 完成並儲存所有更改</button>
        </div>
    </div>

    <div class="nav-bar">
        <button class="nav-item active" id="nav-home" onclick="showPage('execPage')">
            <div class="nav-icon">🏛️</div>指揮部
        </button>
        <button class="nav-item" id="nav-add" onclick="showPage('adminPage')">
            <div class="nav-icon">➕</div>增加/編輯內容
        </button>
    </div>

    <script>
        // 初始化數據
        let db = JSON.parse(localStorage.getItem('wedding_master_db')) || {
            headers: [
                { id: 1, name: "接新娘 (傳統儀式)", time: "08:30", done: false },
                { id: 2, name: "敬茶給長輩", time: "09:15", done: false },
                { id: 3, name: "出發往酒店", time: "10:00", done: false }
            ],
            contacts: [
                { id: 1, name: "找伴郎", tel: "12345678" },
                { id: 2, name: "化妝師", tel: "87654321" },
                { id: 3, name: "找司機", tel: "99990000" }
            ],
            tasks: [
                { id: 1, name: "戒指已交給伴郎", done: false },
                { id: 2, name: "準備敬茶茶具", done: false }
            ]
        };

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById(id === 'execPage' ? 'nav-home' : 'nav-add').classList.add('active');
            if(id === 'execPage') renderExec();
            if(id === 'adminPage') renderAdmin();
        }

        // 首頁渲染
        function renderExec() {
            // 頂部區
            db.headers.sort((a,b) => a.time.localeCompare(b.time));
            document.getElementById('header-display').innerHTML = db.headers.map(h => `
                <div class="header-item ${h.done ? 'done' : ''}" onclick="toggleDone('headers', ${h.id})">
                    <span style="margin-right:10px">${h.done ? '☑️' : '☐'}</span>
                    <span style="flex:1">${h.name}</span>
                    <span style="font-weight:bold">${h.time}</span>
                </div>
            `).join('');

            // 按鈕區
            document.getElementById('contact-display').innerHTML = db.contacts.map(c => `
                <a href="tel:${c.tel}" class="call-btn"><div>📞</div><b>${c.name}</b></a>
            `).join('');

            // 清單區
            db.tasks.sort((a,b) => a.done - b.done);
            document.getElementById('list-view').innerHTML = db.tasks.map(t => `
                <div class="list-item ${t.done ? 'done' : ''}">
                    <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleDone('tasks', ${t.id})">
                    <span>${t.name}</span>
                </div>
            `).join('');
            save();
        }

        // 管理頁渲染
        function renderAdmin() {
            const createEditor = (list, type) => list.map(item => `
                <div class="edit-row">
                    <input type="text" value="${item.name}" onchange="updateItem('${type}', ${item.id}, 'name', this.value)">
                    ${item.time !== undefined ? `<input type="time" value="${item.time}" onchange="updateItem('${type}', ${item.id}, 'time', this.value)" style="flex:0.6">` : ''}
                    ${item.tel !== undefined ? `<input type="tel" value="${item.tel}" onchange="updateItem('${type}', ${item.id}, 'tel', this.value)">` : ''}
                    <button class="btn-del" onclick="removeItem('${type}', ${item.id})">刪</button>
                </div>
            `).join('');

            document.getElementById('edit-header-list').innerHTML = createEditor(db.headers, 'headers');
            document.getElementById('edit-contact-list').innerHTML = createEditor(db.contacts, 'contacts');
            document.getElementById('edit-task-list').innerHTML = createEditor(db.tasks, 'tasks');
        }

        // 資料操作
        function updateItem(type, id, key, val) {
            const item = db[type].find(i => i.id === id);
            item[key] = val;
        }

        function removeItem(type, id) {
            db[type] = db[type].filter(i => i.id !== id);
            renderAdmin();
        }

        function addItem(type) {
            let name, time, tel;
            if(type === 'headers') {
                name = document.getElementById('new-h-name').value;
                time = document.getElementById('new-h-time').value;
                if(!name || !time) return;
                db.headers.push({ id: Date.now(), name, time, done: false });
                document.getElementById('new-h-name').value = "";
            } else if(type === 'contacts') {
                name = document.getElementById('new-c-name').value;
                tel = document.getElementById('new-c-tel').value;
                if(!name || !tel) return;
                db.contacts.push({ id: Date.now(), name, tel });
                document.getElementById('new-c-name').value = ""; document.getElementById('new-c-tel').value = "";
            } else if(type === 'tasks') {
                name = document.getElementById('new-t-name').value;
                if(!name) return;
                db.tasks.push({ id: Date.now(), name, done: false });
                document.getElementById('new-t-name').value = "";
            }
            renderAdmin();
        }

        function toggleDone(type, id) {
            const item = db[type].find(i => i.id === id);
            item.done = !item.done;
            renderExec();
        }

        function saveAndGo() {
            save();
            showPage('execPage');
        }

        function save() {
            localStorage.setItem('wedding_master_db', JSON.stringify(db));
        }

        // 啟動
        renderExec();
    </script>
</body>
</html>
