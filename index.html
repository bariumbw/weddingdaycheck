<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婚禮指揮部</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .completed { text-decoration: line-through; opacity: 0.5; }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <div class="bg-indigo-700 text-white p-4 sticky top-0 z-50 shadow-md">
        <div id="countdown" class="text-center font-bold">載入中...</div>
    </div>

    <div id="execPage" class="page active max-w-md mx-auto p-4 space-y-6">
        
        <div class="grid grid-cols-3 gap-2">
            <a href="tel:12345678" class="bg-white p-3 rounded-xl shadow-sm border text-center text-sm">
                <div class="text-xl mb-1">📞</div><div class="font-bold text-indigo-600">找伴郎</div>
            </a>
            <a href="tel:87654321" class="bg-white p-3 rounded-xl shadow-sm border text-center text-sm">
                <div class="text-xl mb-1">💄</div><div class="font-bold text-indigo-600">化妝師</div>
            </a>
            <a href="tel:55556666" class="bg-white p-3 rounded-xl shadow-sm border text-center text-sm">
                <div class="text-xl mb-1">🚗</div><div class="font-bold text-indigo-600">找司機</div>
            </a>
        </div>

        <div class="bg-white rounded-2xl p-4 shadow-sm border">
            <h2 class="font-bold text-lg mb-4 flex items-center">📋 當日清單</h2>
            <div id="todoContainer" class="space-y-3">
                </div>
        </div>

        <div class="bg-amber-50 border-l-4 border-amber-400 p-4 rounded-r-xl">
            <div class="flex">
                <div class="text-xl mr-3">💡</div>
                <div>
                    <p class="font-bold text-amber-800 text-sm">專家叮嚀</p>
                    <p class="text-amber-700 text-xs">記得每小時喝一口水，保持微笑！</p>
                </div>
            </div>
        </div>
    </div>

    <div id="adminPage" class="page max-w-md mx-auto p-4">
        <h2 class="font-bold text-xl mb-6">⚙️ 增加行程內容</h2>
        <div class="bg-white p-4 rounded-xl shadow-sm border space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">項目名稱</label>
                <input id="newTodoTitle" type="text" class="w-full p-3 bg-slate-100 rounded-lg" placeholder="例如：準備敬茶茶具">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">時間</label>
                <input id="newTodoTime" type="time" class="w-full p-3 bg-slate-100 rounded-lg">
            </div>
            <button onclick="addTodo()" class="w-full py-3 bg-indigo-600 text-white rounded-lg font-bold">確認新增</button>
        </div>
        <p class="text-xs text-slate-400 mt-4 text-center">內容將儲存於此手機瀏覽器</p>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 z-50">
        <button onclick="showPage('execPage')" class="text-xs font-bold text-indigo-600 text-center">
            <div class="text-xl">🏠</div>指揮部
        </button>
        <button onclick="showPage('adminPage')" class="text-xs font-bold text-slate-500 text-center">
            <div class="text-xl">➕</div>增加內容
        </button>
    </div>

    <script>
        // 初始數據 (如果本地沒資料則用這個)
        let todos = JSON.parse(localStorage.getItem('wedding_todos')) || [
            { id: 1, title: "戒指已交給伴郎", time: "08:00", done: false },
            { id: 2, title: "儀式開始", time: "09:00", done: false }
        ];

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function updateCountdown() {
            const target = new Date();
            target.setHours(9, 0, 0); 
            const diff = target - new Date();
            const el = document.getElementById('countdown');
            if(diff > 0) {
                const mins = Math.floor(diff/1000/60);
                el.innerText = `[頂部] 當日核心行程：09:00 AM 儀式開始 (剩 ${mins} 分)`;
            } else {
                el.innerText = `✨ 婚禮進行中 | Enjoy Your Day`;
            }
        }

        function renderTodos() {
            const container = document.getElementById('todoContainer');
            // 排序：未完成在前
            todos.sort((a, b) => a.done - b.done);
            container.innerHTML = todos.map(t => `
                <div class="flex items-center justify-between p-3 rounded-lg border ${t.done ? 'bg-slate-50 completed' : 'bg-white'}">
                    <div class="flex items-center space-x-3">
                        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${t.id})" class="w-5 h-5 text-indigo-600">
                        <span class="text-sm font-medium">${t.title} <span class="text-xs text-slate-400 ml-1">${t.time}</span></span>
                    </div>
                </div>
            `).join('');
            localStorage.setItem('wedding_todos', JSON.stringify(todos));
        }

        function toggleTodo(id) {
            const todo = todos.find(t => t.id === id);
            todo.done = !todo.done;
            renderTodos();
        }

        function addTodo() {
            const title = document.getElementById('newTodoTitle').value;
            const time = document.getElementById('newTodoTime').value;
            if(!title) return alert("請輸入內容");
            todos.push({ id: Date.now(), title, time, done: false });
            document.getElementById('newTodoTitle').value = "";
            renderTodos();
            showPage('execPage');
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
        renderTodos();
    </script>
</body>
</html>
