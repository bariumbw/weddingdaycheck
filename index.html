<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婚禮當天戰鬥指揮部</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .completed {
            text-decoration: line-through;
            opacity: 0.6;
            background-color: #f3f4f6 !important;
        }
        .task-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <div class="bg-indigo-600 text-white p-4 sticky top-0 z-50 shadow-lg">
        <div id="timer" class="text-center font-bold text-lg">
            載入中...
        </div>
    </div>

    <div class="max-w-md mx-auto p-4">
        <h1 class="text-2xl font-bold text-slate-800 mb-6 flex items-center">
            📅 當日核心行程
        </h1>

        <div id="task-list" class="space-y-3">
            </div>

        <div class="mt-10 p-6 bg-white rounded-2xl shadow-sm border border-indigo-100 text-center">
            <span class="inline-block px-3 py-1 bg-indigo-100 text-indigo-700 rounded-full text-xs font-bold mb-3">限時福利</span>
            <p class="text-slate-600 text-sm mb-4">
                掌握了清單，更要掌握現場！<br>
                <strong>「婚禮當天優雅儀態與控場實戰課」</strong><br>
                教你如何在壓力下依然從容。
            </p>
            <a href="#" class="block w-full py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition">
                報名現場課程 (學員專屬 8 折)
            </a>
        </div>
    </div>

    <script>
        // 1. 初始化行程數據
        let tasks = [
            { id: 1, time: "08:30", title: "接新娘 (傳統儀式)", completed: false },
            { id: 2, time: "09:15", title: "向長輩敬茶", completed: false },
            { id: 3, time: "10:00", title: "出發往酒店", completed: false }
        ];

        // 2. 倒數計時功能 (假設儀式是 09:00 AM)
        function updateTimer() {
            const now = new Date();
            // 為了演示，設定為今天的 09:00 AM
            const target = new Date();
            target.setHours(9, 0, 0);

            const diff = target - now;
            const timerEl = document.getElementById('timer');

            if (diff > 0) {
                const mins = Math.floor(diff / 1000 / 60);
                timerEl.innerText = `⏳ 09:00 AM 儀式開始 (剩餘 ${mins} 分鐘)`;
            } else {
                timerEl.innerText = `✨ 婚禮進行中 | 祝新婚快樂`;
                timerEl.classList.replace('bg-indigo-600', 'bg-rose-500');
            }
        }

        // 3. 渲染列表並排序
        function renderTasks() {
            const listEl = document.getElementById('task-list');
            
            // 核心邏輯：未完成排前，已完成排後
            tasks.sort((a, b) => a.completed - b.completed);

            listEl.innerHTML = tasks.map(task => `
                <div class="task-card bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex items-center justify-between ${task.completed ? 'completed' : ''}">
                    <div class="flex items-center space-x-4">
                        <input type="checkbox" 
                               ${task.completed ? 'checked' : ''} 
                               onchange="toggleTask(${task.id})"
                               class="w-6 h-6 rounded-full border-slate-300 text-indigo-600 focus:ring-indigo-500">
                        <div>
                            <p class="font-bold text-slate-800">${task.title}</p>
                            <p class="text-xs text-slate-500">${task.time}</p>
                        </div>
                    </div>
                    ${task.completed ? '✅' : '🔥'}
                </div>
            `).join('');
        }

        // 4. 切換完成狀態
        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            task.completed = !task.completed;
            renderTasks(); // 重新排序並渲染
        }

        // 初始化
        setInterval(updateTimer, 1000);
        updateTimer();
        renderTasks();
    </script>
</body>
</html>
